[package]
name = "qweather-mcp-rs"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "qweather-mcp-server"
path = "src/main.rs"

[lib]
name = "qweather_mcp_rs"
path = "src/lib.rs"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
